; ─────────────────────────────────────────────────────────────────────────
; PHP runtime overrides per kommunity.it (caricato automaticamente da PHP-FPM)
; Questo file viene deployato in public_html/.user.ini tramite .cpanel.yml.
; Se cPanel usa PHP via suEXEC/CGI invece che FPM, queste direttive vengono
; comunque lette ma cache_ttl puo' essere fino a 5 minuti.
; In caso di mancato effetto, impostare i valori da cPanel
; → "MultiPHP INI Editor" → modalita' Editor → public_html.
; ─────────────────────────────────────────────────────────────────────────

; Upload immagini/video membri (avatar, logo, cover, gallery, intro_video)
upload_max_filesize = 32M
post_max_size       = 64M
max_file_uploads    = 20

; Tempi piu' generosi per upload da connessioni lente / video lunghi
max_execution_time  = 300
max_input_time      = 300

; Memoria sufficiente per elaborazione immagini (resize, compressione)
memory_limit        = 256M
