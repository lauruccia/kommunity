---
# ─────────────────────────────────────────────────────────────────────────────
# cPanel Git Version Control — Deploy automation per kommunity.it
#
# STRUTTURA SUL SERVER:
#   /home2/kommunity/kommunity/    ← repo Laravel (questo file vive qui)
#   /home2/kommunity/public_html/  ← web root del dominio kommunity.it
#
# COSA FA:
#   Quando clicchi "Deploy HEAD" da cPanel → Git Version Control,
#   le tasks qui sotto copiano le sottocartelle pubbliche dentro public_html/.
#
# COSA NON TOCCA:
#   - public_html/index.php  (customizzato per puntare a ../kommunity/vendor/)
#   - public_html/.htaccess  (eventuali regole specifiche del dominio)
#   - kommunity/.env, kommunity/vendor/, storage/  (gestiti separatamente)
#
# COME USARLO:
#   1. git push origin main   (da locale)
#   2. cPanel → Git Version Control → Update from Remote
#   3. cPanel → Git Version Control → Deploy HEAD
# ─────────────────────────────────────────────────────────────────────────────
deployment:
  tasks:
    - export DEPLOYPATH=/home2/kommunity/public_html

    # ── Asset statici (cartelle complete) ──────────────────────────────────
    - /bin/cp -R public/css     $DEPLOYPATH/
    - /bin/cp -R public/js      $DEPLOYPATH/
    - /bin/cp -R public/images  $DEPLOYPATH/
    - /bin/cp -R public/fonts   $DEPLOYPATH/
    - /bin/cp -R public/build   $DEPLOYPATH/
    - /bin/cp -R public/brand   $DEPLOYPATH/

    # ── File pubblici singoli (skip silenzioso se non esistono) ───────────
    - /bin/cp public/favicon.ico       $DEPLOYPATH/ 2>/dev/null || true
    - /bin/cp public/robots.txt        $DEPLOYPATH/ 2>/dev/null || true
    - /bin/cp public/manifest.json     $DEPLOYPATH/ 2>/dev/null || true
    - /bin/cp public/sw.js             $DEPLOYPATH/ 2>/dev/null || true
    - /bin/cp public/card-sw.js        $DEPLOYPATH/ 2>/dev/null || true
    - /bin/cp public/.user.ini         $DEPLOYPATH/ 2>/dev/null || true
    # ── SICUREZZA: rimuovi script legacy da public_html se ancora presenti ──
    - /bin/rm -f $DEPLOYPATH/migrate-media.php $DEPLOYPATH/deploy_view.php $DEPLOYPATH/opcache-reset.php $DEPLOYPATH/deploy_content.txt 2>/dev/null || true

    # ── Directory media upload: crea le sottocartelle se non esistono ──────
    # I file caricati dagli utenti vanno in public_html/media/{tipo}/ e sono
    # serviti direttamente da Apache come file statici (nessun passaggio PHP).
    # I file vecchi (path members/...) vengono serviti dal MediaController PHP.
    - /bin/mkdir -p $DEPLOYPATH/media/avatars
    - /bin/mkdir -p $DEPLOYPATH/media/logos
    - /bin/mkdir -p $DEPLOYPATH/media/covers
    - /bin/mkdir -p $DEPLOYPATH/media/gallery
    - /bin/mkdir -p $DEPLOYPATH/media/videos
    - /bin/chmod -R 755 $DEPLOYPATH/media
    - /bin/cp public/media/.htaccess $DEPLOYPATH/media/.htaccess

    # ── Permessi corretti per Apache ───────────────────────────────────────
    - /bin/find $DEPLOYPATH/css    -type f -exec /bin/chmod 644 {} \;
    - /bin/find $DEPLOYPATH/js     -type f -exec /bin/chmod 644 {} \;
    - /bin/find $DEPLOYPATH/images -type f -exec /bin/chmod 644 {} \;
    - /bin/find $DEPLOYPATH/fonts  -type f -exec /bin/chmod 644 {} \;
    - /bin/find $DEPLOYPATH/build  -type f -exec /bin/chmod 644 {} \;
    - /bin/find $DEPLOYPATH/brand  -type f -exec /bin/chmod 644 {} \;

    # ── Svuota cache view Blade compilate (forza ricompilazione a ogni deploy) ─
    - /bin/find /home2/kommunity/kommunity/storage/framework/views -name "*.php" -type f -delete 2>/dev/null || true
